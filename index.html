    * {

    }

    html, body {
      height: 100%;
    }

    :root {
      --bg-primary: #faf7f5;
      --bg-secondary: #f5ede8;
      --card-bg: #fbf9f7;
      --text-primary: #4a3c34;
      --text-secondary: #7a6b63;
      --accent-warm: #a08270;
      --accent-dark: #8b6f5f;
      --border-light: #ede3db;
      --shadow-sm: 0 4px 12px rgba(74, 60, 52, 0.08);
      --shadow-md: 0 8px 24px rgba(74, 60, 52, 0.12);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    main {
      width: 100%;
      height: 100%;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 80px;
    }

    /* Header */
    header {
      padding: 32px 0 24px;
      text-align: center;
      border-bottom: 1px solid var(--border-light);
    }

    .brand {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    /* Hero Section */
    .hero {
      padding: 64px 0;
      text-align: center;
    }

    .hero-title {
      font-family: 'Lora', serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
      line-height: 1.15;
      letter-spacing: -0.01em;
    }

    .hero-description {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 620px;
      margin: 0 auto 28px;
      line-height: 1.7;
      font-weight: 300;
    }

    .hero-quote {
      font-family: 'Lora', serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--accent-dark);
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Products Section */
    .products {
      padding: 64px 0;
    }

    .product-list {
      display: grid;
      gap: 48px;
    }

    .product-card {
      display: grid;
      grid-template-columns: 1.15fr 1fr;
      gap: 48px;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 28px 48px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.3s ease;
    }

    .product-card:hover {
      box-shadow: var(--shadow-md);
    }

    .product-card:nth-child(2n) {
      grid-template-columns: 1fr 1.15fr;
    }

    .product-card:nth-child(2n) .product-info {
      order: 2;
    }

    .product-card:nth-child(2n) .product-image {
      order: 1;
    }

    .product-image-wrapper {
      display: flex;
      flex-direction: column;
      order: 1;
    }

    .product-info-wrapper {
      display: flex;
      flex-direction: column;
      order: 2;
    }

    .product-info {
      display: flex;
      flex-direction: column;
    }

    .product-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent-dark);
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .product-name {
      font-family: 'Lora', serif;
      font-size: clamp(1.6rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
      line-height: 1.2;
    }

    .product-description {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      line-height: 1.6;
      font-weight: 300;
    }

    .product-price {
      margin-bottom: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-warm);
    }

    .product-button {
      align-self: flex-start;
      padding: 14px 36px;
      background: var(--accent-warm);
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Outfit', sans-serif;
    }

    .product-button:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
    }

    .product-button:active {
      transform: translateY(0);
    }

    .product-image {
      background: linear-gradient(135deg, #e8dcd2 0%, #f2e8df 50%, #faf7f5 100%);
      border-radius: 8px;
      width: 100%;
      max-width: 420px;
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: scroll;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .product-image:hover {
      transform: scale(1.02);
    }

    .product-card:nth-child(1) .product-image,
    .product-card:nth-child(3) .product-image {
      background: linear-gradient(135deg, #e8dcd2 0%, #f2e8df 50%, #faf7f5 100%) !important;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-card:nth-child(1) .product-image img,
    .product-card:nth-child(3) .product-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }

    /* Image Modal */
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .image-modal.active {
      display: flex;
    }

    .modal-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-image {
      width: 100%;
      height: 100%;
      max-width: 600px;
      max-height: 600px;
      object-fit: contain;
      border-radius: 12px;
    }

    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid #ffffff;
      color: #ffffff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.3s ease;
      padding: 0;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      .modal-close {
        top: 10px;
        right: 10px;
        width: 40px;
        height: 40px;
        font-size: 20px;
      }

      .modal-image {
        max-width: 85vw;
        max-height: 70vh;
      }
    }

    /* Copy Toast */
    .copy-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent-warm);
      color: #ffffff;
      padding: 14px 24px;
      border-radius: 6px;
      box-shadow: var(--shadow-md);
      z-index: 2000;
      font-size: 0.95rem;
      font-weight: 500;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .copy-toast.hide {
      animation: slideOut 0.3s ease;
    }

    /* Footer */
    footer {
      padding: 48px 24px;
      text-align: center;
      border-top: 1px solid var(--border-light);
      background-color: var(--bg-secondary);
      margin-top: 32px;

      font-weight: 300;

      .product-list {

      }

      .product-info-wrapper {
        order: 2;
        width: 100%;
      }

      .product-image {
        height: 300px;
        width: 100%;
        max-width: 100%;
        font-size: 4rem;
        border-radius: 8px;
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #f5ede8;
      }

      .product-image img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
      }

        margin-bottom: 16px;
      }

      .product-name {

      .product-description {
        font-size: 0.95rem;
        margin-bottom: 16px;
      }

        margin-bottom: 20px;
      }

      .product-button {
        padding: 12px 28px;
        font-size: 0.85rem;
        align-self: flex-start;
      }
    }
